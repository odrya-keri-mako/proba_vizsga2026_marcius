    <!-- Offcanvas filter -->
    <div class="offcanvas offcanvas-end" 
         tabindex="-1" 
         id="offcanvasFilter"
         data-bs-backdrop="false" 
         aria-labelledby="offcanvasFilterLabel">
      <div class="offcanvas-header">
        <img src="./assets/image/logos/filter.png" height="100">
        <button type="button" 
                class="btn-close" 
                data-bs-dismiss="offcanvas" 
                aria-label="Close"></button>
      </div>

      <!-- Form -->
      <div class="offcanvas-body">
        <form name="filterForm">

          <!-- Search (filter) -->
          <div class="mb-4">
            <label for="search" 
                   class="form-label">
              <i class="fa-solid fa-filter me-1"></i>
              Szelekció:
            </label>
            <input type="search" 
                   class="form-control"
                   autocomplete="off"
                   spellcheck="false"
                   placeholder="szelekció" 
                   id="search"
                   oninput="filterChanged()">
          </div>
          <hr>

          <!-- Name -->
          <div class="form-check">
            <input class="form-check-input" 
                   type="radio" 
                   name="filter" 
                   id="name" 
                   onchange="filterChanged()">
            <label class="form-check-label" 
                   for="name">
              Név
            </label>
          </div>

          <!-- Genre name -->
          <div class="form-check">
            <input class="form-check-input" 
                   type="radio" 
                   name="filter" 
                   id="genre_name"
                   onchange="filterChanged()">
            <label class="form-check-label" 
                   for="genre_name">
              Műfaj
            </label>
          </div>

          <!-- Author -->
          <div class="form-check">
            <input class="form-check-input" 
                   type="radio" 
                   name="filter" 
                   id="author"
                   onchange="filterChanged()">
            <label class="form-check-label" 
                   for="author">
              Szerző
            </label>
          </div>

          <!-- Publicated -->
          <div class="form-check">
            <input class="form-check-input" 
                   type="radio" 
                   name="filter" 
                   id="publicated"
                   onchange="filterChanged()">
            <label class="form-check-label" 
                   for="publicated">
              Kiadás éve
            </label>
          </div>

          <!-- Description -->
          <div class="form-check">
            <input class="form-check-input" 
                   type="radio" 
                   name="filter" 
                   id="description"
                   onchange="filterChanged()">
            <label class="form-check-label" 
                   for="description">
              Leíreás
            </label>
          </div>
          <hr>
        </form>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" 
         id="bookModal" 
         data-bs-backdrop="static" 
         data-bs-keyboard="false" 
         tabindex="-1" 
         aria-labelledby="bookModalLabel" 
         aria-hidden="true">
      <div class="modal-dialog 
                  modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">

          <!-- Header -->
          <div class="modal-header">
            <h3 class="modal-title fs-5" 
                id="bookModalLabel"></h3>
            <button type="button" 
                    class="btn-close" 
                    data-bs-dismiss="modal" 
                    aria-label="Close"></button>
          </div>

          <!-- Form -->
          <div class="modal-body">
            <form name="bookForm">

              <!-- Identifier -->
              <div class="row mb-3 align-items-center">
                <label for="id" 
                       class="col-3 form-label">
                  Azonosító:
                </label>
                <div class="col-9">
                  <input type="number" 
                         class="form-control form-control-sm"
                         autocomplete="off" 
                         id="id" 
                         disabled
                         style="width: 100px;">
                </div>
              </div>

              <!-- Name -->
              <div class="mb-3">
                <label for="name" 
                       class="form-label">
                  Név:
                </label>
                <input type="text" 
                       class="form-control form-control-sm" 
                       autocomplete="off" 
                       spellcheck="false"
                       placeholder="név"
                       id="name" 
                       name="name"
                       required
                       pattern="^(?=(?:.*[^ ]){2,}).*$"
                       oninput="inputChanged()">
              </div>

              <!-- Genre -->
              <div class="mb-3">
                <label for="genre_id" 
                       class="form-label">
                  Műfaj:
                </label>
                <select class="form-select form-select-sm" 
                        id="genre_id" 
                        name="genre_id"
                        required
                        oninput="inputChanged()">
                </select>
              </div>

              <!-- Author -->
              <div class="mb-3">
                <label for="author" 
                       class="form-label">
                  Szerző:
                </label>
                <input type="text" 
                       class="form-control form-control-sm" 
                       autocomplete="off"
                       spellcheck="false"
                       placeholder="szerző"
                       id="author" 
                       name="author"
                       required
                       pattern="^(?=(?:.*[^ ]){2,}).*$"
                       oninput="inputChanged()">
              </div>

              <!-- Publicated -->
              <div class="row mb-3 align-items-center">
                <label for="publicated" 
                       class="col-3 form-label">
                  Kiadás éve:
                </label>
                <div class="col-9">
                  <input type="text" 
                         class="form-control form-control-sm"
                         autocomplete="off" 
                         spellcheck="false" 
                         id="publicated"
                         name="publicated"
                         pattern="^[1-9][0-9]{3}$"
                         maxlength="4" 
                         required
                         placeholder="kiadva"
                         style="width: 100px;"
                         oninput="inputChanged()">
                </div>
              </div>

              <!-- Description -->
              <div class="mb-4">
                <label for="description" 
                       class="form-label">
                  Leírás:
                </label>
                <textarea class="form-control form-control-sm"
                          autocomplete="off" 
                          spellcheck="false"
                          placeholder="Leírás" 
                          id="description"
                          name="description"
                          rows="3" 
                          required
                          pattern="^(?=(?:.*[^ ]){2,}).*$"
                          oninput="inputChanged()">
                </textarea>
              </div>

              <!-- Buttons -->
              <div class="mb-3 text-end">

                <!-- Cancel -->
                <button type="button" 
                        class="btn btn-secondary mx-1" 
                        data-bs-dismiss="modal">
                  <i class="fa-solid fa-circle-xmark"></i>
                  <span id="btn-cancel"></span>
                </button>

                <!-- Save -->
                <button id="btn-save"
                        type="button" 
                        class="btn btn-primary mx-1"
                        data-bs-dismiss="modal"
                        onclick="saveBook()">
                  <i class="fa-solid fa-floppy-disk"></i>
                  Mentés
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

  <script src="../components/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
  <script src="./js/common.js"></script>
  <script>

    // Get data
    getData().then(response => {

      // Set response
      genres  = response.genres; 
      books   = response.books;

      // Create table
      createTable();

      // Create modal select options
      createGenreSelection();
    })
    .catch(e => alert(e));

    // Get elements, creat bootstrap modal, and get last choice theme
    let tbody             = document.querySelector('tbody'),
        filterInputs      = document.querySelectorAll('form[name="filterForm"] input'),
        filterIcons       = document.querySelectorAll('header i.fa-filter'),
        modalElement      = document.querySelector('#bookModal'),
        modalInputs       = modalElement.querySelectorAll('input, select, textarea'),
        modalLabel        = modalElement.querySelector('#bookModalLabel'),
        modalGenresSelect = modalElement.querySelector('select#genre_id'),
        modalBtnSave      = modalElement.querySelector('#btn-save'),
        modalBtnCancel    = modalElement.querySelector('#btn-cancel'),
        bookModal         = new bootstrap.Modal(modalElement, {keyboard: false});

    // Create table
    function createTable() {

      // Reset table body
      tbody.innerHTML = '';

      // When filter exist then convert to lowercase
      if (filter.search) filter.search = filter.search.toLocaleLowerCase();

      // Setting signal to see if there is a suitable element
      let isEmty = true;

      // Set index
      let index = 0;

      // Each books
      books.forEach(book => {

        // Get/Check genre
        let genre = genres.find(item => item.id === book.genre_id);
        if (!genre) genre = {name: ''};

        // Check filter exist
        let isShow = true;
        if (filter.search) {
          switch(filter.key) {
            case 'genre_name':
              isShow = genre.name.toLocaleLowerCase()
                                 .includes(filter.search);
              break;
            case 'publicated':
              isShow = book[filter.key].toString()
                                       .toLocaleLowerCase()
                                       .includes(filter.search);
              break;
            default:
              isShow = book[filter.key].toLocaleLowerCase()
                                       .includes(filter.search);
          }
        }

        // Check is bokk enabled
        if (isShow) {

          isEmty = false;
          let tr = document.createElement('tr');
          tr.classList.add('align-middle');
          tr.innerHTML =
             `<td class="text-end">${++index}</td>
              <td class="text-end">${book.id}</td>
              <td>${book.name}</td>
              <td>${genre.name}</td>
              <td>${book.author}</td>
              <td class="text-center">${book.publicated}</td>
              <td class="text-center">
                <button class="btn btn-sm mx-1 my-1 btn-info text-white"
                        onclick="openModal(${book.id}, 'details')"
                        title="Részletek"
                        data-bs-toggle="tooltip" 
                        data-bs-title="Részletek">
                  <i class="fa-solid fa-book-open"></i>
                </button>
                <button class="btn btn-sm mx-1 my-1 btn-success"
                        onclick="openModal(${book.id}, 'modify')"
                        title="Módosít"
                        data-bs-toggle="tooltip" 
                        data-bs-title="Módosít">
                  <i class="fa-solid fa-file-pen"></i>
                </button>
                <button class="btn btn-sm mx-1 my-1 btn-danger"
                        onclick="deleteBook(${book.id})"
                        title="Törlés"
                        data-bs-toggle="tooltip" 
                        data-bs-title="Törlés">
                  <i class="fa-solid fa-circle-xmark"></i>
                </button>
              </td>`;
          tbody.append(tr);
        }
      });

      // When is empty then add empty row
      if (isEmty) {
        tbody.innerHTML = 
          `<tr>
              <td colspan="7" class="text-center">Üres</td>
            </tr>`;
      } else setBsTooltips();
    }

    // Delete book
    function deleteBook(id) {
      if (confirm(`Biztossan törli a könyvet a kínálatból?`)) {
        fetch('./php/delete.php', {
          method: 'POST',
          body: JSON.stringify({id: id})
        })
        .then(response => response.json())
        .then(response => {
          if (!response.error) {

            // Set response
            books = response.data;

            // Create table
            createTable();

          } else alert(response.error);
        })
        .catch(e => alert(e.message));
      }
    }

    // Save book
    function saveBook() {
      let data  = {},
          isNew = false,
          url   = null;

      // Cast values
      modalInputs.forEach(item => {
        switch(item.id) {
          case 'id':
            isNew = !item.value;
            if (!isNew) data[item.id] = Number(item.value);
            break;
          case 'genre_id':
            data[item.id] = Number(item.value);
            break;
          default:
            data[item.id] = item.value;
        }
      });

      // Set request
      url = isNew ? 'post' : 'put';
      fetch(`./php/${url}.php`, {
        method: 'POST',
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(response => {
        if (!response.error) {

          // Set response 
          books = response.data;

          // Create table
          createTable();

          // Create message content
          let msg = isNew ? 'A könyvet sikerült felvenni!' : 
                            'A könyv módosítása megtörtént!';

          setTimeout(() => alert(msg), 100);

        } else alert(response.error);
      })
      .catch(e => alert(e.message));
    }

    // Create modal select options
    function createGenreSelection() {
      let opt = document.createElement('option');
      opt.setAttribute('value', '');
      opt.setAttribute('id', 'please-choose-option');
      opt.setAttribute('selected', '');
      opt.setAttribute('hidden', '');
      opt.textContent = '-- Kérem válasszon --';
      modalGenresSelect.append(opt);
      genres.forEach(item => {
        let opt = document.createElement('option');
        opt.setAttribute('value', item.id);
        opt.textContent = item.name;
        modalGenresSelect.append(opt);
      });
    }

    // Open modal
    function openModal(id, type) {
      let book = books.find(item => item.id === id);
      switch(type) {
        case 'modify':
        case 'new':
          modalLabel.textContent = type === 'modify' ? 'MÓDOSÍT' : 'FELVÉTEL';
          modalBtnSave.classList.remove('d-none');
          modalBtnCancel.textContent = 'Mégsem';
          modalBtnSave.disabled = type === 'new';
          setTimeout(() => {
            let inputElement = modalElement.querySelector('input:not([disabled])');
            if (inputElement) inputElement.focus();
          }, 500);
          break;

        case 'details':
          modalLabel.textContent = 'RÉSZLETEK';
          modalBtnSave.classList.add('d-none');
          modalBtnCancel.textContent = 'Bezár';
          break;
      }

      // Set inputs value, and validity
      modalInputs.forEach(item => {
        if (book && item.id in book) 
              item.value = book[item.id];
        else  item.value = '';
        if (type === 'details' || item.id === 'id')
              item.setAttribute('disabled', '');
        else  item.removeAttribute('disabled');  
      });
      bookModal.show();
    }

    // Input changed
    function inputChanged() {
      let isDisabled = false;
      for (let i=0; i< modalInputs.length; i++) {
        if (modalInputs[i].tagName === 'TEXTAREA' && 
            modalInputs[i].getAttribute('pattern')) {
          const regex = new RegExp(modalInputs[i].getAttribute('pattern'));
          const value = modalInputs[i].value.trim();
          if ((isDisabled = !regex.test(value))) break; 
        }
        else if ((isDisabled = !modalInputs[i].checkValidity())) break;
      }
      modalBtnSave.disabled = isDisabled;
    }

    // Filter changed
    function filterChanged() {
      filterInputs[0].value = filterInputs[0].value.trim();
      let method  = filterInputs[0].value === '' ? 'remove' : 'add',
          id      = null;
      for(let i=1; i<filterInputs.length; i++) {
        if ('checked' in filterInputs[i] && filterInputs[i].checked) {
          id = filterInputs[i].id;
          break;
        }
      }
      filterIcons.forEach(e => e.classList[method]('text-danger'));

      // Set filter
      filter = {
        search: filterInputs[0].value,
        key: id
      };

      // Save filter
      localStorage.setItem('keri_library_filter', JSON.stringify(filter));

      // Create table
      createTable();
    }

    // Set offcanvas saved filter
    let filterSearch = [...filterInputs].filter(e => e.id === 'search');
    if (filterSearch.length) filterSearch[0].value = filter.search;
    let filterKey = [...filterInputs].filter(e => e.id === filter.key);
    if (filterKey.length) filterKey[0].checked = true;
    
    // Set header filter icon
    if (filter.search) 
      filterIcons.forEach(e => e.classList.add('text-danger'));

    // Remove focus warring when modal close
    modalElement.addEventListener('hide.bs.modal', () => {
        if (document.activeElement instanceof HTMLElement)
          document.activeElement.blur();
    });

    // Set bootstrap tooltips
    setBsTooltips();
  </script>
</body>
</html>
